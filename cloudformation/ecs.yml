AWSTemplateFormatVersion: '2010-09-09'
Description: ALB + ECS Fargate Backend

Resources:

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from internet
      VpcId: !ImportValue fullstack-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: alb-sg

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from ALB and VPC
      VpcId: !ImportValue fullstack-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: ecs-sg

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: fullstack-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue fullstack-public-subnet-1
        - !ImportValue fullstack-public-subnet-2
      SecurityGroups:
        - !Ref ALBSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: fullstack-tg
      Port: 5000
      Protocol: HTTP
      TargetType: ip
      VpcId: !ImportValue fullstack-vpc-id
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecsTaskExecutionRole-fullstack
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                  - kms:Decrypt
                Resource: '*'

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: fullstack-cluster

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/backend-demo
      RetentionInDays: 7

  ECRApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !ImportValue fullstack-vpc-id
      ServiceName: com.amazonaws.us-east-1.ecr.api
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !ImportValue fullstack-private-subnet-1
      SecurityGroupIds:
        - !Ref ECSSecurityGroup

  ECRDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !ImportValue fullstack-vpc-id
      ServiceName: com.amazonaws.us-east-1.ecr.dkr
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !ImportValue fullstack-private-subnet-1
      SecurityGroupIds:
        - !Ref ECSSecurityGroup

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !ImportValue fullstack-vpc-id
      ServiceName: com.amazonaws.us-east-1.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !ImportValue fullstack-private-rt

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !ImportValue fullstack-vpc-id
      ServiceName: com.amazonaws.us-east-1.logs
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !ImportValue fullstack-private-subnet-1
      SecurityGroupIds:
        - !Ref ECSSecurityGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: backend-demo
      Cpu: 256
      Memory: 512
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: 127424156209.dkr.ecr.us-east-1.amazonaws.com/backend-demo:latest
          PortMappings:
            - ContainerPort: 5000
          Secrets:
            - Name: DB_HOST
              ValueFrom: arn:aws:ssm:us-east-1:127424156209:parameter/fullstack/DB_HOST
            - Name: DB_NAME
              ValueFrom: arn:aws:ssm:us-east-1:127424156209:parameter/fullstack/DB_NAME
            - Name: DB_USER
              ValueFrom: arn:aws:ssm:us-east-1:127424156209:parameter/fullstack/DB_USER
            - Name: DB_PASS
              ValueFrom: arn:aws:ssm:us-east-1:127424156209:parameter/fullstack/DB_PASS
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/backend-demo
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:5000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: backend-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !ImportValue fullstack-private-subnet-1
          SecurityGroups:
            - !Ref ECSSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 5000
          TargetGroupArn: !Ref TargetGroup

Outputs:
  ALBDNSName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: fullstack-alb-dns

  ECSSecurityGroupId:
    Value: !Ref ECSSecurityGroup
    Export:
      Name: fullstack-ecs-sg
